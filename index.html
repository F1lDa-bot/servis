                                </div>
                                ${devicesHtml}
                            `;
                        }
                        
                        card.innerHTML = cardContent;
                        tasksGrid.appendChild(card);
                    });
            }

            function getActiveButtonClasses(category) {
                switch (category) {
                    case 'Playstation':
                        return ['bg-blue-600', 'text-white', 'font-semibold'];
                    case 'Xbox':
                        return ['bg-green-600', 'text-white', 'font-semibold'];
                    case 'Nintendo':
                        return ['bg-red-600', 'text-white', 'font-semibold'];
                    case 'Diagnostiky a čištění':
                        return ['bg-purple-600', 'text-white', 'font-semibold'];
                    case 'Výkupy':
                        return ['bg-orange-600', 'text-white', 'font-semibold'];
                    case 'iPhony/Mac':
                        return ['bg-yellow-500', 'text-slate-900', 'font-semibold'];
                    case 'Ovladače':
                        return ['bg-pink-600', 'text-white', 'font-semibold'];
                    default: // 'Vše'
                        return ['bg-sky-600', 'text-white', 'font-semibold'];
                }
            }

            function setupFilters() {
                const buttons = ['Vše', ...categories];
                const inactiveClasses = 'bg-slate-200 hover:bg-slate-300 text-slate-700';

                filterButtonsContainer.innerHTML = buttons.map(category => {
                    const isActive = category === 'Vše';
                    const activeClasses = getActiveButtonClasses('Vše').join(' ');
                    const buttonClasses = isActive ? activeClasses : inactiveClasses;
                    return `<button class="filter-btn px-3 py-1.5 text-sm rounded-md transition-colors duration-200 ${buttonClasses}" data-category="${category}">${category}</button>`;
                }).join('');

                filterButtonsContainer.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        activeFilter = e.target.dataset.category;
                        
                        document.querySelectorAll('.filter-btn').forEach(btn => {
                            btn.className = `filter-btn px-3 py-1.5 text-sm rounded-md transition-colors duration-200 ${inactiveClasses}`;
                        });
                        
                        const activeClasses = getActiveButtonClasses(activeFilter);
                        e.target.classList.remove(...inactiveClasses.split(' '));
                        e.target.classList.add(...activeClasses);

                        renderCards();
                    }
                });
            }

            tasksGrid.addEventListener('click', (e) => {
                if (e.target.classList.contains('show-more-btn')) {
                    const button = e.target;
                    const card = button.closest('.task-card');
                    const hiddenDevices = card.querySelector('.hidden-devices');
                    
                    if (hiddenDevices) {
                        const isHidden = hiddenDevices.classList.contains('hidden');
                        hiddenDevices.classList.toggle('hidden');
                        button.textContent = isHidden ? 'skrýt' : 'další...';
                    }
                }
                if (e.target.classList.contains('sku-item')) {
                    const sku = e.target.dataset.sku;
                    navigator.clipboard.writeText(sku).then(() => {
                        const feedback = e.target.nextElementSibling;
                        feedback.style.opacity = '1';
                        setTimeout(() => {
                           feedback.style.opacity = '0';
                        }, 1500);
                    }).catch(err => {
                        console.error('Failed to copy: ', err);
                    });
                }
            });

            searchInput.addEventListener('input', renderCards);

            renderCards();
            setupFilters();
        });
    </script>
</body>
</html>
