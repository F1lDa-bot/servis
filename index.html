<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktivní přehled servisních úkonů</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chosen Palette: Warm Neutrals (Slate, Stone, Sky) with brand accents (Blue, Green, Red, Purple, Orange, Yellow) -->
    <!-- Application Structure Plan: Původní dashboard rozložení s grafem bylo odstraněno na žádost uživatele. Nová struktura je jednodušší, jednolitá. Všechny ovládací prvky (vyhledávání, filtry kategorií) jsou umístěny nahoře nad seznamem úkonů pro snadný přístup. Seznam úkonů je zobrazen v mřížce pod filtry. Tento design zjednodušuje uživatelské rozhraní a zaměřuje se čistě na rychlé filtrování a vyhledávání dat bez doplňkových vizualizací. -->
    <!-- Visualization & Content Choices: Graf byl odstraněn. Data jsou prezentována výhradně jako karty v mřížce (HTML/Tailwind). Nově byla přidána vizuální distinkce pomocí barev pro všechny kategorie pro rychlejší vizuální identifikaci. Aktivní filtr nyní barevně koresponduje s kategorií. Přidány údaje "Bonus" a "Úkony". Cíl: Informování a organizace. Interakce: Filtrování a vyhledávání (JS). -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .task-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .task-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900">Přehled servisních úkonů</h1>
            <p class="mt-2 text-lg text-slate-600">Interaktivní nástroj pro rychlé vyhledávání standardizovaných popisů oprav a SK kódů.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-1">
                    <label for="search" class="block text-sm font-medium text-slate-700 mb-2">Vyhledat úkon (popis, SK, bonus...):</label>
                    <input type="text" id="search" placeholder="Např. baterie, S0033..." class="w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
                </div>
                <div class="md:col-span-2">
                    <h3 class="text-sm font-medium text-slate-700 mb-2">Filtrovat podle kategorie:</h3>
                    <div id="filter-buttons" class="flex flex-wrap gap-2">
                    </div>
                </div>
            </div>
        </div>

        <main>
            <div id="tasks-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            </div>
        </main>
    </div>

    <script>
        const serviceTasksData = [
            { sku: 'S0033', category: 'Playstation', internal: 'LB1 - jedná se o výměnu HDD/SSD', external: 'Pro zákazníka výměna pevného disku', bonus: 100, ukony: 0.75 },
            { sku: 'S0034', category: 'Playstation', internal: 'LB2 - jedná se o výměnu HDD/SSD u PS4 + výměna dvou potenciometrů u ovladačů', external: 'Pro zákazníka výměna ventilátoru, zdroje, mechaniky u PS4, nebo výměna dvou potenciometrů u jakéhokoliv playstation ovladače', bonus: 170, ukony: 1.5 },
            { sku: 'S0035', category: 'Playstation', internal: 'LB3 - jedná se o výměnu více dílů u PS4 nebo výměnu jednoho dílu u PS5', external: 'Pro zákazníka výměna ventilátoru a zdroje a mechaniky zároveň u PS4, nebo výměna ventilátoru, zdroje, mechaniky u PS5', bonus: 250, ukony: 1.75 },
            { sku: 'S0045', category: 'Playstation', internal: 'LB5 - jedná se o opravu ovladače', external: 'Pro zákazníka výměna jednoho potenciometru, výměna nabíjecího portu, výměna kloboučků, výměna tlačítek, výměna krytu ovladače', bonus: 130, ukony: 1.25 },
            { sku: 'S0042', category: 'Xbox', internal: 'LB1 - jedná se o výměnu HDD/SSD u Xbox konzolí', external: 'Pro zákazníka výměna pevného disku', bonus: 100, ukony: 1 },
            { sku: 'S0043', category: 'Xbox', internal: 'LB2 - jedná se o výměnu jednoho dílu u Xbox ONE/ Series S', external: 'Pro zákazníka výměna ventilátoru, zdroje, mechaniky u Xboxu ONE/ Series S', bonus: 170, ukony: 1.5 },
            { sku: 'S0044', category: 'Xbox', internal: 'LB3 - jedná se o výměnu více dílů u Xbox ONE/Series S nebo jednoho dílu Xbox Series X', external: 'Pro zákazníka výměna ventilátoru a zdroje a mechaniky zároveň u Xboxu ONE/ Series S, nebo výměna ventilátoru, zdroje, mechaniky', bonus: 250, ukony: 2 },
            { sku: 'S0037', category: 'Xbox', internal: 'LB5 - jedná se o opravu ovladačů Xbox', external: 'Pro zákazníka výměna jednoho potenciometru, výměna nabíjecího portu, výměna kloboučků, výměna tlačítek, výměna krytu ovladače', bonus: 130, ukony: 1.25 },
            { sku: 'S0036', category: 'Nintendo', internal: 'LB4-jedná se o opravu konzolí nintendo', external: 'Pro zákazníka výměna baterie, větráku, čtečky herních karet, čtečky paměťových karet, kolejnic', bonus: 150, ukony: 1.5 },
            { sku: 'S0038', category: 'Nintendo', internal: 'LB6-jedná se o opravu Joy-Con/ovladačů nintendo', external: 'Pro zákazníka výměna jednoho potenciometru, výměna baterie, výměna tlačítek, výměna krytu ovladače, výměna kolejnic', bonus: 100, ukony: 1 },
            { sku: 'S8800', category: 'Diagnostiky a čištění', internal: 'Diagnostika ovladače', external: 'Pro zákazníka Diagnostika ovladače', bonus: 82, ukony: 1 },
            { sku: 'S6605', category: 'Diagnostiky a čištění', internal: 'Diagnostika konzole', external: 'Pro zákazníka Diagnostika konzole', bonus: 99, ukony: 1 },
            { sku: 'S8804', category: 'Diagnostiky a čištění', internal: 'Update/reinstalace operačního systému konzole', external: 'Pro zákazníka Update/reinstalace operačního systému konzole', bonus: 99, ukony: 1 },
            { sku: 'S8777', category: 'Diagnostiky a čištění', internal: 'Čištění a přepastování konzolí PS4,PS5,Xbox One,X,S', external: 'Pro zákazníka Čištění a přepastování konzolí PS4,PS5,Xbox One,X,S', bonus: 214, ukony: 1 },
            { sku: 'S0159', category: 'Diagnostiky a čištění', internal: 'Zpracování výkupu technikem na prodejně Konzole, Apple Watch', external: 'Pro zákazníka Zpracování výkupu technikem na prodejně Konzole, Apple Watch', bonus: 100, ukony: 0.38 },
            { sku: 'S0050', category: 'Výkupy', internal: 'LB1 - jedná se o výměnu HDD/SSD, opravy Joy-Con/ovladačů nintendo', external: 'Pro zákazníka výměna pevného disku, výměna jednoho potenciometru, výměna baterie, výměna tlačítek, výměna krytu ovladače, výměna kolejnic', bonus: 80, ukony: 0.75 },
            { sku: 'S0051', category: 'Výkupy', internal: 'LB2 - jedná se o opravu ovladačů Xbox,PS, oprava konzolí Nintendo 1 potenciometr (17 znaků v Able)', external: 'Pro zákazníka výměna jednoho potenciometru u všech ovladačů nebo výměna jednoho dílu u Nintendo konzole', bonus: 100, ukony: 1.25 },
            { sku: 'S0052', category: 'Výkupy', internal: 'LB3 - oprava mechaniky PS/Xbox nebo čištění + přepastování (13 znaků v Able)', external: 'Pro zákazníka výměna mechaniky všechny Playstationy nebo všechny Xboxy, čištění a přepastování konzole', bonus: 120, ukony: 1.5 },
            { sku: 'S0053', category: 'Výkupy', internal: 'LB4 - výměna více dílů u konzolí + výměna dvou potenciometrů u ovladačů (13 znaků v Able)', external: 'Pro zákazníka výměna ventilátoru a zdroje a mechaniky zároveň u všech konzolí nebo výměna dvou potenciometrů u všech ovladačů', bonus: 150, ukony: 1.5 },
            { sku: 'S0019', category: 'iPhony/Mac', internal: 'Reinstalace iOS', external: 'Pro zákazníka Reinstalace iOS', bonus: 65, ukony: 1 },
            { sku: 'S0003', category: 'iPhony/Mac', internal: 'Reinstalace MacOS', external: 'Pro zákazníka Reinstalace MacOS', bonus: 165, ukony: 1 },
            { sku: 'S0001', category: 'iPhony/Mac', internal: 'Diagnostika zařízení a čištění iOS/Android', external: 'Pro zákazníka Diagnostika zařízení a čištění iOS/Android', bonus: 74, ukony: 1 },
            { sku: 'S0102', category: 'iPhony/Mac', internal: 'Diagnostika zařízení a čištění Airpods/EarPods', external: 'Pro zákazníka Diagnostika zařízení a čištění Airpods/EarPods', bonus: 82, ukony: 1 },
            { sku: 'S0160', category: 'iPhony/Mac', internal: 'Diagnostika a čištění DEMO a vratek', external: 'Pro zákazníka Diagnostika a čištění DEMO a vratek', bonus: 40, ukony: 0.38 },
            { sku: 'S0158', category: 'iPhony/Mac', internal: 'Zpracování výkupu na prodejně technikem iPhone, Android, Mac', external: 'Pro zákazníka Zpracování výkupu na prodejně technikem iPhone, Android, Mac', bonus: 60, ukony: 0.38 },
            { sku: 'S0018', category: 'iPhony/Mac', internal: 'Kontrola výkupu diagnostika a čištění následné odesílání např na jinou prodejnu', external: 'Pro zákazníka Kontrola výkupu diagnostika a čištění následné odesílání např na jinou prodejnu', bonus: 40, ukony: 0.38 },
            { sku: 'S0031', category: 'iPhony/Mac', internal: 'Zamítnutí záruční reklamace', external: 'Pro zákazníka Zamítnutí záruční reklamace', bonus: 0, ukony: 0 },
            { sku: '15642', category: 'iPhony/Mac', internal: 'Pokud díl není naskladněný a potřebuješ si zaúčtovat cenu opravy - použij tuto skladovou kartu', external: 'Pro zákazníka Pokud díl není naskladněný a potřebuješ si zaúčtovat cenu opravy - použij tuto skladovou kartu', bonus: 55, ukony: 1 },
            { sku: 'S0021', category: 'iPhony/Mac', internal: 'Zamítnutí reklamace ze strany zákazníka', external: 'Pro zákazníka Zamítnutí reklamace ze strany zákazníka', bonus: 20, ukony: 1 },
            { sku: '196266', category: 'iPhony/Mac', internal: 'Zprostředkování služby konzultantem', external: 'Pro zákazníka Zprostředkování služby konzultantem', bonus: 110, ukony: 1 },
            { sku: 'S0063', category: 'iPhony/Mac', internal: 'Jakýkoliv díl na iPhone 6-11 (včetně pro modelů) pro ZKZ', external: 'Pro zákazníka výměna baterie, displeje, reproduktoru, tlačítek, nabíjecí cívky - jednotlivě u modelů iPhonů 6 až 11', bonus: 220, ukony: 1.5 },
            { sku: 'S0064', category: 'iPhony/Mac', internal: 'Jakýkoliv díl na iPhone 12 a výše nebo výměna 2 dílů na jakém koliv modelu pro ZKZ', external: 'Pro zákazníka výměna baterie, displeje, reproduktoru, tlačítek, nabíjecí cívky - jednotlivě u modelů iPhonů 12 a dále, výměna displeje', bonus: 275, ukony: 2 },
            { sku: 'S0065', category: 'iPhony/Mac', internal: 'Výměna housingu na jakýkoliv model - Platí jak u výkupu tak pro ZKZ', external: 'Pro zákazníka Výměna housingu na jakýkoliv model - Platí jak u výkupu tak pro ZKZ', bonus: 100, ukony: 1.25 },
            { sku: 'S0016', category: 'iPhony/Mac', internal: 'Výměna jednoho dílu u iPhonu 6-11 (včetně pro modelů) u výkupu', external: 'Pro zákazníka výměna baterie, displeje, reproduktoru, tlačítek, nabíjecí cívky - jednotlivě u modelů iPhonů 6 až 11', bonus: 150, ukony: 1.5 },
            { sku: 'S0017', category: 'iPhony/Mac', internal: 'Výměna jednoho dílu u iPhonu 12 a výš nebo 2 dílů na jakém koliv modelu u výkupu', external: 'Pro zákazníka výměna baterie, displeje, reproduktoru, tlačítek, nabíjecí cívky - jednotlivě u modelů iPhonů 12 a dále, výměna displeje a baterie zároveň', bonus: 150, ukony: 1.5 },
        ];
        
        document.addEventListener('DOMContentLoaded', () => {
            const tasksGrid = document.getElementById('tasks-grid');
            const filterButtonsContainer = document.getElementById('filter-buttons');
            const searchInput = document.getElementById('search');

            const categories = [...new Set(serviceTasksData.map(task => task.category))];
            let activeFilter = 'Vše';

            function renderCards() {
                tasksGrid.innerHTML = '';
                const searchTerm = searchInput.value.toLowerCase();

                serviceTasksData
                    .filter(task => (activeFilter === 'Vše' || task.category === activeFilter) && 
                                   (task.internal.toLowerCase().includes(searchTerm) || 
                                    task.external.toLowerCase().includes(searchTerm) ||
                                    task.sku.toLowerCase().includes(searchTerm) ||
                                    String(task.bonus).includes(searchTerm) ||
                                    String(task.ukony).includes(searchTerm)))
                    .forEach(task => {
                        const card = document.createElement('div');
                        card.className = 'task-card bg-white p-5 rounded-lg shadow-md border border-slate-200 flex flex-col';
                        card.dataset.category = task.category;

                        let categoryBgClass = 'bg-slate-100';
                        let categoryTextClass = 'text-slate-800';

                        switch (task.category) {
                            case 'Playstation':
                                categoryBgClass = 'bg-blue-100';
                                categoryTextClass = 'text-blue-800';
                                break;
                            case 'Xbox':
                                categoryBgClass = 'bg-green-100';
                                categoryTextClass = 'text-green-800';
                                break;
                            case 'Nintendo':
                                categoryBgClass = 'bg-red-100';
                                categoryTextClass = 'text-red-800';
                                break;
                            case 'Diagnostiky a čištění':
                                categoryBgClass = 'bg-purple-100';
                                categoryTextClass = 'text-purple-800';
                                break;
                            case 'Výkupy':
                                categoryBgClass = 'bg-orange-100';
                                categoryTextClass = 'text-orange-800';
                                break;
                            case 'iPhony/Mac':
                                categoryBgClass = 'bg-yellow-100';
                                categoryTextClass = 'text-yellow-800';
                                break;
                        }
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-3 gap-2">
                                <span class="inline-block ${categoryBgClass} ${categoryTextClass} text-xs font-semibold px-2.5 py-0.5 rounded-full whitespace-nowrap">${task.category}</span>
                                <div class="flex items-center gap-2 flex-wrap justify-end">
                                    <span class="text-xs font-mono bg-emerald-100 text-emerald-800 px-2 py-1 rounded">Bonus: ${task.bonus}</span>
                                    <span class="text-xs font-mono bg-cyan-100 text-cyan-800 px-2 py-1 rounded">Úkony: ${task.ukony}</span>
                                    <span class="text-xs font-mono bg-slate-200 text-slate-700 px-2 py-1 rounded">SK: ${task.sku}</span>
                                </div>
                            </div>
                            <div>
                                <h4 class="font-semibold text-slate-800 text-sm mb-1">Interní popis:</h4>
                                <p class="text-sm text-slate-600 mb-3">${task.internal}</p>
                            </div>
                            <div class="mt-auto pt-3 border-t border-slate-200">
                                <h4 class="font-semibold text-slate-800 text-sm mb-1">Co jsem opravil:</h4>
                                <p class="text-sm text-slate-900 font-medium">${task.external}</p>
                            </div>
                        `;
                        tasksGrid.appendChild(card);
                    });
            }

            function getActiveButtonClasses(category) {
                switch (category) {
                    case 'Playstation':
                        return ['bg-blue-600', 'text-white', 'font-semibold'];
                    case 'Xbox':
                        return ['bg-green-600', 'text-white', 'font-semibold'];
                    case 'Nintendo':
                        return ['bg-red-600', 'text-white', 'font-semibold'];
                    case 'Diagnostiky a čištění':
                        return ['bg-purple-600', 'text-white', 'font-semibold'];
                    case 'Výkupy':
                        return ['bg-orange-600', 'text-white', 'font-semibold'];
                    case 'iPhony/Mac':
                        return ['bg-yellow-500', 'text-slate-900', 'font-semibold'];
                    default: // 'Vše'
                        return ['bg-sky-600', 'text-white', 'font-semibold'];
                }
            }

            function setupFilters() {
                const buttons = ['Vše', ...categories];
                const inactiveClasses = 'bg-slate-200 hover:bg-slate-300 text-slate-700';

                filterButtonsContainer.innerHTML = buttons.map(category => {
                    const isActive = category === 'Vše';
                    const activeClasses = getActiveButtonClasses('Vše').join(' ');
                    const buttonClasses = isActive ? activeClasses : inactiveClasses;
                    return `<button class="filter-btn px-3 py-1.5 text-sm rounded-md transition-colors duration-200 ${buttonClasses}" data-category="${category}">${category}</button>`;
                }).join('');

                filterButtonsContainer.addEventListener('click', (e) => {
                    if (e.target.tagName === 'BUTTON') {
                        activeFilter = e.target.dataset.category;
                        
                        document.querySelectorAll('.filter-btn').forEach(btn => {
                            btn.className = `filter-btn px-3 py-1.5 text-sm rounded-md transition-colors duration-200 ${inactiveClasses}`;
                        });
                        
                        const activeClasses = getActiveButtonClasses(activeFilter);
                        e.target.classList.remove(...inactiveClasses.split(' '));
                        e.target.classList.add(...activeClasses);

                        renderCards();
                    }
                });
            }

            searchInput.addEventListener('input', renderCards);

            renderCards();
            setupFilters();
        });
    </script>
</body>
</html>
